<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Phishing Email Prediction</title>
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Stunning animated background */
    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: url("{{ url_for('static', filename='img/gradient.png') }}") no-repeat center center fixed;
      background-size: cover;
      filter: blur(6px) brightness(0.7);
      z-index: -2;
    }

    /* Gradient overlay */
    body::after {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, rgba(30,60,114,0.7), rgba(42,82,152,0.6), rgba(0,198,255,0.5));
      z-index: -1;
      animation: gradientMove 10s ease infinite;
      background-size: 200% 200%;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      display: flex;
      width: 900px;
      height: 500px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      z-index: 1;
    }

    /* Left panel */
    .left-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
      color: white;
      background: rgba(255, 255, 255, 0.05);
    }

    .left-panel h1 {
      font-size: 55px;
      margin-bottom: 20px;
      font-weight: 800;
      text-align: center;
      background: linear-gradient(90deg, #1e3c72, #2a5298, #00c6ff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
      animation: shine 5s linear infinite;
      background-size: 200% auto;
    }

    @keyframes shine {
      to {
        background-position: 200% center;
      }
    }

    .left-panel p {
      font-size: 18px;
      text-align: center;
      max-width: 300px;
      color: #ddd;
    }

    /* Right panel */
    .right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(6px);
    }

    .login-card {
      width: 100%;
      max-width: 350px;
      padding: 30px;
    }

    .login-card h2 {
      font-size: 28px;
      margin-bottom: 20px;
      text-align: center;
      color: #fff;
    }

    .input-group {
      margin-bottom: 20px;
      width: 100%;
    }

    .input-group label {
      display: block;
      font-size: 14px;
      margin-bottom: 6px;
      color: #eee;
    }

    .input-group input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 16px;
      background: rgba(255,255,255,0.8);
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      background: linear-gradient(90deg, #1e3c72, #2a5298, #00c6ff);
      color: white;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(0,198,255,0.4);
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Left Panel -->
    <div class="left-panel">
      <h1>Phishing<br>Prediction<br>System</h1>
      <p>WELCOME!</p>
      <p>Stay protected from malicious emails.</p>
    </div>

    <!-- Right Panel -->
    <div class="right-panel">
      <div class="login-card">
        <h2>Login</h2>
        <form action="/login" method="post">
          <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter Username" required>
          </div>
          <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter Password" required>
          </div>
          <button type="submit" class="btn">Login</button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
