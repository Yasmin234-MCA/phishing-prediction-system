<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Phishing Email Prediction</title>
   <!-- 🧩 Favicon (Logo in browser tab) -->
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo.png') }}">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: url("{{ url_for('static', filename='img/gradient.png') }}") no-repeat center center fixed;
      background-size: cover;
      position: relative;
      color: white;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(120deg, rgba(0,0,0,0.6), rgba(30,60,114,0.7), rgba(42,82,152,0.6));
      background-size: 400% 400%;
      animation: gradientMove 12s ease infinite;
      z-index: -1;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 50px; background: rgba(0,0,0,0.55); position: sticky; top: 0; z-index: 10; backdrop-filter: blur(10px); }
    .navbar .logo { font-size: 24px; font-weight: bold; background: linear-gradient(90deg,#00c6ff,#2a5298,#1e3c72); background-clip: text; -webkit-background-clip: text; color: transparent; -webkit-text-fill-color: transparent; }
    .nav-links { list-style: none; display: flex; gap: 25px; }
    .nav-links a { text-decoration: none; font-size: 16px; font-weight: 500; color: #fff; transition: color 0.3s ease; }
    .nav-links a:hover, .nav-links .active { color: #00c6ff; }

    .hero { text-align: center; padding: 80px 20px 40px; }
    .hero h1, .form-section h2 { font-weight: 800; background: linear-gradient(270deg,#00c6ff,#2a5298,#1e3c72,#00c6ff); background-size: 600% 600%; background-clip: text; -webkit-background-clip: text; color: transparent; -webkit-text-fill-color: transparent; animation: gradientText 8s ease infinite; }
    .hero h1 { font-size: 52px; margin-bottom: 10px; }
    .form-section h2 { font-size: 26px; margin-bottom: 20px; }
    @keyframes gradientText { 0% { background-position:0% 50%; } 50% { background-position:100% 50%; } 100% { background-position:0% 50%; } }
    .hero p { font-size: 20px; color: #ddd; }

    .form-section { max-width: 450px; margin: 40px auto; padding: 30px; background: rgba(255,255,255,0.08); border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.5); text-align: center; backdrop-filter: blur(15px); }
    label { display: block; text-align: left; margin: 10px 0 5px; font-size: 16px; font-weight: 500; }
    input[type="email"] { width: 100%; padding: 12px 15px; border: none; border-radius: 8px; outline: none; font-size: 16px; margin-bottom: 20px; }
    button { width: 100%; padding: 12px; background: linear-gradient(90deg,#1e3c72,#2a5298,#00c6ff); border: none; border-radius: 8px; font-size: 18px; font-weight: bold; color: white; cursor: pointer; transition: 0.3s ease; }
    button:hover { opacity: 0.9; transform: scale(1.05); }
    .history-link { display: inline-block; margin-top: 15px; font-size: 14px; text-decoration: none; color: #00c6ff; font-weight: 500; }
    .history-link:hover { text-decoration: underline; }

    /* Toast Notification */
    #toast {
      visibility: hidden;
      min-width: 250px;
      margin-left: -125px;
      background-color: rgba(0,0,0,0.8);
      color: #fff;
      text-align: center;
      border-radius: 8px;
      padding: 16px;
      position: fixed;
      z-index: 1000;
      left: 50%;
      top: 50px;
      font-size: 16px;
      opacity: 0;
      transition: opacity 0.5s, top 0.5s;
    }
    #toast.show {
      visibility: visible;
      top: 50px;
      opacity: 1;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo">Prediction System</div>
    <ul class="nav-links">
      <li><a href="/login">Login</a></li>
      <li><a href="/history">History</a></li>
      <li><a href="/" class="active">Prediction</a></li>
    </ul>
  </nav>

  <section class="hero">
    <h1>Phishing Prediction System</h1>
    <p>Check if an email is safe or phishing</p>
  </section>

  <section class="form-section">
    <form method="POST">
      <label for="email">Email :</label>
      <input type="email" id="email" name="email" placeholder="Enter Email Address" required>
      <button type="submit">Check here</button>
    </form>
  </section>

  <!-- Toast Notification -->
  <div id="toast"></div>

  {% if already_analyzed %}
  <script>
    // Show toast
    let toast = document.getElementById("toast");
    toast.innerHTML = "This email is already analyzed!";
    toast.className = "show";
    setTimeout(function(){ toast.className = toast.className.replace("show",""); }, 4000);

    // Prepare speech message
    let msg = "This email is already analyzed. Prediction: {{ previous_prediction }}. Confidence score: {{ previous_confidence }}. Risk message: {{ previous_risk_message }}.";
    let utter = new SpeechSynthesisUtterance(msg);
    window.speechSynthesis.speak(utter);
  </script>
  {% endif %}
</body>
</html>
